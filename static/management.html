<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VispyCoach — Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.12);
    --muted: rgba(255,255,255,0.35);
    --text: #f0f0f0;
  }

  body {
    background: #000;
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Ambient background ── */
  #ambient {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 50% at 50% -5%, rgba(59,130,246,0.08) 0%, transparent 70%);
    transition: background 1.5s ease;
  }

  .page-wrap {
    position: relative; z-index: 1;
    max-width: 960px; margin: 0 auto;
    padding: 32px 24px 120px; /* bottom pad for fixed reply bar */
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
    animation: fadeUp 0.5s ease both;
  }
  .header-left h1 {
    font-size: 1.4rem; font-weight: 700; letter-spacing: -0.4px;
    background: linear-gradient(135deg, #fff 30%, rgba(147,197,253,0.85) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-left p { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }

  /* ── Connection pill ── */
  #conn-pill {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 99px; padding: 7px 14px;
    font-size: 0.75rem; color: var(--muted);
    transition: border-color 0.3s, color 0.3s;
  }
  #conn-pill.live {
    border-color: rgba(34,197,94,0.4);
    color: #86efac;
  }
  #conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2a2a2a;
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  #conn-dot.live {
    background: #22c55e;
    box-shadow: 0 0 8px rgba(34,197,94,0.6);
    animation: live-pulse 1.8s ease-in-out infinite;
  }
  @keyframes live-pulse {
    0%,100% { box-shadow: 0 0 6px rgba(34,197,94,0.4); }
    50%      { box-shadow: 0 0 14px rgba(34,197,94,0.8); }
  }

  /* ── Empty state ── */
  #empty-state {
    text-align: center; margin-top: 100px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .empty-icon {
    font-size: 2.5rem; margin-bottom: 16px; opacity: 0.3;
    filter: grayscale(1);
  }
  #empty-state h3 { font-size: 1rem; color: rgba(255,255,255,0.2); font-weight: 500; }
  #empty-state p  { font-size: 0.78rem; color: rgba(255,255,255,0.1); margin-top: 6px; }

  /* ── Alert cards ── */
  #alerts { display: flex; flex-direction: column; gap: 14px; }

  .alert-card {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(239,68,68,0.25);
    border-left: 3px solid #ef4444;
    border-radius: 16px; padding: 20px 22px;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    animation: cardSlideIn 0.4s cubic-bezier(0.34,1.2,0.64,1) both;
    position: relative; overflow: hidden;
  }
  .alert-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 0% 0%, rgba(239,68,68,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .alert-card.warning {
    border-color: rgba(245,158,11,0.25);
    border-left-color: #f59e0b;
  }
  .alert-card.warning::before {
    background: radial-gradient(ellipse at 0% 0%, rgba(245,158,11,0.06) 0%, transparent 60%);
  }
  @keyframes cardSlideIn {
    from { opacity: 0; transform: translateY(-12px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }

  .alert-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .alert-badges { display: flex; align-items: center; gap: 8px; }
  .badge {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; padding: 3px 10px; border-radius: 99px;
  }
  .badge-critical { background: rgba(239,68,68,0.18); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  .badge-warning  { background: rgba(245,158,11,0.18); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  .badge-emotion  { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); border: 1px solid var(--border); }
  .alert-ts { font-size: 0.7rem; color: rgba(255,255,255,0.2); font-variant-numeric: tabular-nums; }

  .alert-stress-bar {
    height: 3px; border-radius: 99px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 14px; overflow: hidden;
  }
  .alert-stress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444);
    background-size: 300% 100%;
    transition: width 0.8s ease, background-position 0.8s ease;
  }

  .alert-trigger {
    font-size: 0.9rem; color: rgba(255,255,255,0.8);
    line-height: 1.6; margin-bottom: 14px;
    font-style: italic;
  }
  .alert-trigger::before { content: '"'; color: rgba(255,255,255,0.2); }
  .alert-trigger::after  { content: '"'; color: rgba(255,255,255,0.2); }

  .alert-transcript {
    list-style: none;
    border-top: 1px solid var(--border);
    padding-top: 12px; margin-bottom: 10px;
  }
  .alert-transcript li {
    font-size: 0.78rem; color: rgba(255,255,255,0.3);
    padding: 3px 0; line-height: 1.5;
  }
  .alert-transcript li:last-child { color: rgba(255,255,255,0.55); font-weight: 500; }

  .alert-lead {
    font-size: 0.73rem; color: rgba(255,255,255,0.25);
    border-top: 1px solid var(--border); padding-top: 10px;
    margin-top: 2px;
  }
  .alert-lead strong { color: rgba(255,255,255,0.4); }

  /* ── Fixed reply bar at bottom ── */
  #reply-wrap {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    padding: 16px 24px 20px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
  }
  #reply-inner {
    max-width: 960px; margin: 0 auto;
    display: flex; align-items: center; gap: 10px;
  }
  #reply-hint {
    font-size: 0.68rem; color: rgba(255,255,255,0.18);
    margin-bottom: 8px; max-width: 960px; margin: 0 auto 8px;
  }
  kbd {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; font-size: 0.65rem;
    color: rgba(255,255,255,0.25); font-family: inherit;
  }
  #reply-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-size: 0.88rem; padding: 12px 16px;
    outline: none; font-family: inherit;
    transition: border-color 0.2s, background 0.2s;
  }
  #reply-input:focus {
    border-color: rgba(59,130,246,0.5);
    background: rgba(255,255,255,0.06);
  }
  #reply-input::placeholder { color: rgba(255,255,255,0.18); }
  #reply-input:disabled { opacity: 0.3; }

  #btn-send {
    background: rgba(37,99,235,0.2);
    border: 1px solid rgba(96,165,250,0.4);
    border-radius: 10px; color: #bfdbfe;
    font-size: 0.82rem; font-weight: 600;
    padding: 11px 22px; cursor: pointer;
    font-family: inherit; letter-spacing: 0.2px;
    position: relative; overflow: hidden;
    transition: background 0.2s, border-color 0.2s, transform 0.1s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #btn-send::before {
    content: ''; position: absolute; top: 0; left: -75%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: skewX(-20deg);
  }
  #btn-send:hover:not(:disabled)::before { animation: btn-shine 0.5s ease forwards; }
  @keyframes btn-shine { from{left:-75%} to{left:125%} }
  #btn-send:hover:not(:disabled) {
    background: rgba(37,99,235,0.32);
    border-color: rgba(147,197,253,0.65);
    box-shadow: 0 0 20px rgba(37,99,235,0.25);
  }
  #btn-send:active { transform: scale(0.96); }
  #btn-send:disabled { opacity: 0.25; cursor: default; }
  .btn-ripple {
    position: absolute; border-radius: 50%;
    transform: scale(0); opacity: 0.3;
    animation: ripple-anim 0.5s ease-out forwards;
    pointer-events: none; background: rgba(147,197,253,0.6);
  }
  @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

  /* ── Sent flash ── */
  .sent-flash {
    font-size: 0.75rem; color: #86efac;
    animation: fadeUp 0.2s ease, fadeOut 0.3s 2.5s ease forwards;
    text-align: center; margin-bottom: 6px;
    max-width: 960px; margin-left: auto; margin-right: auto;
  }
  @keyframes fadeOut { to { opacity: 0; } }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<div id="ambient"></div>

<div class="page-wrap">
  <header>
    <div class="header-left">
      <h1>VispyCoach — Management</h1>
      <p>Live escalation alerts from active rep calls</p>
    </div>
    <div id="conn-pill">
      <div id="conn-dot"></div>
      <span id="conn-label">Connecting...</span>
    </div>
  </header>

  <div id="alerts">
    <div id="empty-state">
      <div class="empty-icon">📡</div>
      <h3>No escalations yet</h3>
      <p>Alerts appear here when the rep's call shows high stress or objection signals</p>
    </div>
  </div>
</div>

<!-- Fixed reply bar -->
<div id="reply-wrap">
  <div id="reply-hint">Press <kbd>/</kbd> to focus · <kbd>Enter</kbd> to send · <kbd>Esc</kbd> to dismiss</div>
  <div id="reply-inner">
    <input id="reply-input" type="text"
      placeholder="Send strategy to rep — e.g. 'Offer 2 months free and loop in Sarah...'"
      disabled />
    <button id="btn-send" disabled>Send to Rep</button>
  </div>
</div>

<script>
const WS_URL = `ws://${location.host}/ws/management`;

let ws = null;
const connDot    = document.getElementById('conn-dot');
const connPill   = document.getElementById('conn-pill');
const connLabel  = document.getElementById('conn-label');
const alertsEl   = document.getElementById('alerts');
const emptyEl    = document.getElementById('empty-state');
const replyInput = document.getElementById('reply-input');
const btnSend    = document.getElementById('btn-send');
const ambient    = document.getElementById('ambient');

// ── Ripple ──────────────────────────────────────────────────────────────────
btnSend.addEventListener('click', (e) => {
  const rect = btnSend.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const r = document.createElement('span');
  r.className = 'btn-ripple';
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btnSend.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
});

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    connDot.classList.add('live');
    connPill.classList.add('live');
    connLabel.textContent = 'Live — watching call';
    replyInput.disabled = false;
    btnSend.disabled = false;
  };

  ws.onclose = () => {
    connDot.classList.remove('live');
    connPill.classList.remove('live');
    connLabel.textContent = 'Reconnecting...';
    replyInput.disabled = true;
    btnSend.disabled = true;
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'escalation') addAlert(data);
  };
}

// ── Alert card ───────────────────────────────────────────────────────────────
function addAlert(data) {
  if (emptyEl) emptyEl.remove();

  const severity = data.severity || (data.reason?.includes('stress') ? 'critical' : 'warning');
  const isCritical = severity === 'critical';

  const card = document.createElement('div');
  card.className = `alert-card ${isCritical ? '' : 'warning'}`;

  const stressPct = data.stress_pct || 0;
  const bgPos = stressPct + '%';

  const transcriptHTML = (data.transcript || [])
    .map(t => `<li>${escHtml(t)}</li>`).join('');

  const leadHTML = data.lead_info
    ? `<div class="alert-lead"><strong>Lead:</strong> ${escHtml(data.lead_info)}</div>`
    : '';

  card.innerHTML = `
    <div class="alert-header">
      <div class="alert-badges">
        <span class="badge ${isCritical ? 'badge-critical' : 'badge-warning'}">${isCritical ? '⬤ Critical' : '◆ Warning'}</span>
        <span class="badge badge-emotion">${escHtml(data.emotion || 'unknown')}</span>
      </div>
      <span class="alert-ts">${data.ts || ''}</span>
    </div>
    <div class="alert-stress-bar">
      <div class="alert-stress-fill" style="width:${stressPct}%;background-position:${bgPos} 0"></div>
    </div>
    <div class="alert-trigger">${escHtml(data.trigger_text || '')}</div>
    <ul class="alert-transcript">${transcriptHTML}</ul>
    ${leadHTML}
  `;

  alertsEl.insertBefore(card, alertsEl.firstChild);

  // Pulse ambient color on critical
  if (isCritical) {
    ambient.style.background = 'radial-gradient(ellipse 70% 50% at 50% -5%, rgba(239,68,68,0.12) 0%, transparent 70%)';
    setTimeout(() => {
      ambient.style.background = 'radial-gradient(ellipse 70% 50% at 50% -5%, rgba(59,130,246,0.08) 0%, transparent 70%)';
    }, 2000);
  }
}

// ── Send ─────────────────────────────────────────────────────────────────────
function sendMessage() {
  const text = replyInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'manager_message', text }));
  replyInput.value = '';

  const flash = document.createElement('div');
  flash.className = 'sent-flash';
  flash.textContent = `✓ Sent to rep: "${text}"`;
  document.getElementById('reply-wrap').prepend(flash);
  setTimeout(() => flash.remove(), 3000);
}

btnSend.addEventListener('click', sendMessage);
replyInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== replyInput) {
    e.preventDefault();
    replyInput.focus();
  }
  if (e.key === 'Escape') replyInput.blur();
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

connect();
</script>
</body>
</html>
